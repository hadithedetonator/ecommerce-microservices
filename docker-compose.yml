version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  user_service:
    build: ./user_service
    ports:
      - "5001:5000"
    volumes:
      - ./user_service:/app
    environment:
      - SERVICE_NAME=user_service

  order_service:
    build: ./order_service
    ports:
      - "5002:5000"
    volumes:
      - ./order_service:/app
    environment:
      - SERVICE_NAME=order_service
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq/
    depends_on:
      - rabbitmq

  notification_service:
    build: ./notification_service
    ports:
      - "5003:5000"
    volumes:
      - ./notification_service:/app
    environment:
      - SERVICE_NAME=notification_service
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq/
    depends_on:
      - rabbitmq
