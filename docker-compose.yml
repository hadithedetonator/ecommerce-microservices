version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - microservice_network

  user_service:
    build: ./user_service
    ports:
      - "5001:5000"
    volumes:
      - ./user_service:/app
    environment:
      - SERVICE_NAME=user_service
      - DATABASE_URL=sqlite+aiosqlite:///./test.db
      - PYTHONUNBUFFERED=1
    networks:
      - microservice_network

  order_service:
    build: ./order_service
    ports:
      - "5002:5000"
    volumes:
      - ./order_service:/app
    environment:
      - SERVICE_NAME=order_service
      - DATABASE_URL=sqlite+aiosqlite:///./orders.db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq/
      - PYTHONUNBUFFERED=1
    depends_on:
      - rabbitmq
    networks:
      - microservice_network

  notification_service:
    build: ./notification_service
    # notification service doesn't need to expose ports as it's a consumer
    volumes:
      - ./notification_service:/app
    environment:
      - SERVICE_NAME=notification_service
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq/
      - PYTHONUNBUFFERED=1
    depends_on:
      - rabbitmq
    networks:
      - microservice_network

networks:
  microservice_network:
    driver: bridge
